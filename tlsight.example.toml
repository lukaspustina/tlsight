# tlsight configuration
# See docs/done/sdd-2026-03-08.md for the design document.

# Display name shown in the UI header, footer, and page title.
# Default: "tlsight"
#site_name = "tlsight"

[server]
bind = "127.0.0.1:8082"
metrics_bind = "127.0.0.1:9092"
# trusted_proxies = ["10.0.0.0/8"]

[limits]
per_ip_per_minute = 30
per_ip_burst = 10
per_target_per_minute = 60
per_target_burst = 20
max_concurrent_connections = 256
max_concurrent_handshakes = 10
max_ports = 5
max_ips_per_hostname = 10
handshake_timeout_secs = 5
request_timeout_secs = 15

[dns]
timeout_secs = 3

[validation]
expiry_warning_days = 30
expiry_critical_days = 14
check_dane = true
check_caa = true
check_ct = false
# custom_ca_dir = "/etc/tlsight/ca.d/"

# [ecosystem]
# Public URLs for cross-tool navigation (served to browser frontends).
# ip_base_url = "https://ip.example.com"
# dns_base_url = "https://dns.example.com"
# tls_base_url = "https://tls.example.com"
# http_base_url = "https://http.example.com"
# email_base_url = "https://email.example.com"
# lens_base_url = "https://lens.example.com"

# [backends.ip]
# Internal IP enrichment backend (enables geo, ASN, rDNS badges).
# url = "http://ifconfig-rs:8000"
# timeout_ms = 500
# max_concurrent = 20
# cache_ttl_secs = 300
# cache_capacity = 1024

[quality]
# enabled = true
# http_check_timeout_secs = 5
# skip_http_checks = false

[telemetry]
# Log output format: "text" (default, human-readable) or "json" (structured, for log aggregators).
# Override via TLSIGHT_TELEMETRY__LOG_FORMAT=json
# log_format = "text"

# Set enabled = true and configure otlp_endpoint to export traces via OTLP.
# enabled = false
# otlp_endpoint = "http://localhost:4318"
# service_name = "tlsight"
# sample_rate = 1.0
