# tlsight production configuration
# See docs/sdd.md for full documentation.

[server]
bind = "0.0.0.0:8081"
# metrics_bind is intentionally localhost-only: the endpoint is unauthenticated.
# To scrape from Prometheus, use a sidecar, host network, or port-forward — do not expose to 0.0.0.0.
metrics_bind = "127.0.0.1:9090"
# trusted_proxies = ["10.0.0.0/8"]

[limits]
per_ip_per_minute = 30
per_ip_burst = 10
per_target_per_minute = 60
per_target_burst = 20
max_concurrent_connections = 256
max_concurrent_handshakes = 10
max_ports = 5
max_ips_per_hostname = 10
handshake_timeout_secs = 5
request_timeout_secs = 15

[dns]
resolver = "cloudflare"
timeout_secs = 3

[validation]
expiry_warning_days = 30
expiry_critical_days = 14
check_dane = true
check_caa = true
check_ct = false
# custom_ca_dir = "/etc/tlsight/ca.d/"

[ecosystem]
dns_base_url = "https://dns.pdt.sh"
ip_base_url = "https://ip.pdt.sh"
# ip_api_url = "https://ip.pdt.sh"   # enables IP enrichment (geo, ASN, rDNS)
# enrichment_timeout_ms = 500

[quality]
enabled = true
http_check_timeout_secs = 5
